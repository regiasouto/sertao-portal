version: "3.8"

services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sertao-portal
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
